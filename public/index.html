<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCCCCCat！</title>
    <link rel="icon" type="image/png" href="/favicon.png" />

    <link rel="stylesheet" href="/style.css" />
    <script defer src="/ccc.js"></script>
    <script defer src="/index.js"></script>
  </head>

  <body>
    <div class="bg-pattern"></div>

    <div class="container">
      <div class="logo-wrap">
        <img src="/favicon.png" alt="Cat Logo" class="logo" />
        <div class="cat-ears">
          <span class="ear left">◟</span>
          <span class="ear right">◞</span>
        </div>
      </div>

      <h1 class="main-title">
        <span class="title-c">C</span><span class="title-c">C</span
        ><span class="title-c">C</span><span class="title-c">C</span
        ><span class="title-c">C</span><span class="title-c">C</span>at！
      </h1>
      <p class="subtitle">🐾 猫咪专属链接编码器 🐾</p>

      <div class="input-group">
        <div class="input-wrap">
          <span class="input-icon">🐱</span>
          <input
            id="input-url"
            placeholder="Paste your URL here..."
            autocomplete="off"
          />
        </div>
        <button id="btn">
          <span class="btn-text">Cccccat</span>
          <span class="btn-kaomoji hidden">(｀･ω･´)</span>
        </button>
      </div>

      <div id="result" class="hidden">
        <div class="result-card">
          <div class="result-header">
            <span class="paw">🐾</span>
            <p>Result</p>
            <span class="paw">🐾</span>
          </div>
          <a id="output-url" target="_blank"></a>
          <button id="copy">
            <span class="copy-text">Copy</span>
            <span class="copy-icon">📋</span>
          </button>
        </div>
      </div>

      <div class="footer-cats">
        <span class="f-cat">🐈</span>
        <span class="f-cat">🐈‍⬛</span>
        <span class="f-cat">🐱</span>
        <span class="f-cat">😺</span>
        <span class="f-cat">😸</span>
        <span class="f-cat">😹</span>
        <span class="f-cat">😻</span>
        <span class="f-cat">😼</span>
        <span class="f-cat">😽</span>
        <span class="f-cat">🙀</span>
        <span class="f-cat">😿</span>
        <span class="f-cat">😾</span>
      </div>
    </div>

    <div class="floating-paws">
      <span class="fp" style="--i: 1">🐾</span>
      <span class="fp" style="--i: 2">🐾</span>
      <span class="fp" style="--i: 3">🐾</span>
      <span class="fp" style="--i: 4">🐾</span>
      <span class="fp" style="--i: 5">🐾</span>
      <span class="fp" style="--i: 6">🐾</span>
    </div>
  </body>
</html>
