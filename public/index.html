<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Stop using boring short URLs, make them purrfectly long with cats!">

    <title>ccccccccccccccccccc.cc | URL Lengthner</title>
    <link rel="icon" type="image/png" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css">
    <link rel="stylesheet" href="/style.css?v=2" />

    <script defer src="/ooo.js?v=2"></script>
    <script defer src="/index.js?v=2"></script>
</head>

<body>
    <div class="container">
        <div class="content">
            <div class="cat-ears">
                <div class="ear left"></div>
                <div class="ear right"></div>
            </div>
            <h1>Cccccccccccccccccccccat</h1>
            <div class="d-flex">
                <input type="text" class="input-url" id="input-url" placeholder="Lengthen yooour URL, meow!"
                    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
                <button id="ccc-button" onclick="cccify()">cccccccat!</button>
            </div>
            <div id="output-div" style="display: none;">
                <h2 style="margin-bottom: 1em;">Yooour new url:</h2>
                <div style="word-wrap: break-word; font-size: 1.2em">
                    <a id="output-url" target="_blank"></a>
                </div>
                <div class="tooltip">
                    <button id="copy-button" onclick="copy()">
                        Cooopy
                    </button>
                    <span class="tooltip-text">Cooopied!</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        made with
        <svg xmlns="http://www.w3.org/2000/svg" fill="#FF6B6B" viewBox="0 0 24 24"
            style="height: 1.2em; vertical-align: middle">

        </svg>
        and
        <span class="paw">🐾</span>
        by
        <a target="_blank" href="https://luca.gg"> luca.gg </a>
        <span style="margin: 0 0.4em;">|</span>
        <a target="_blank" href="https://github.com/lucaceriani/ooo"> source </a>
        <span style="margin: 0 0.4em;">|</span>
        <a target="_blank" href="https://ko-fi.com/lucaceriani">buy me a cat treat</a>
    </footer>
</body>

</html>
