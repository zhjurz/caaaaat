<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCC Encoder</title>

    <link rel="stylesheet" href="/style.css" />
    <script defer src="/ccc.js"></script>
    <script defer src="/index.js"></script>
  </head>

  <body>
    <div class="container">
      <h1>🐱 CCC URL Encoder</h1>

      <div class="input-group">
        <input id="input-url" placeholder="Paste your URL here..." />
        <button id="btn">Encode</button>
      </div>

      <div id="result" class="hidden">
        <p>Result:</p>
        <a id="output-url" target="_blank"></a>
        <button id="copy">Copy</button>
      </div>
    </div>
  </body>
</html>
