<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Make your URLs purrfectly longer with cat power!"
    />
    <title>ccccccccccccccccccccc.ccc | URL Lengthner</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/style.css?v=3" />
    <script defer src="/ccc.js?v=3"></script>
    <script defer src="/index.js?v=3"></script>
  </head>
  <body>
    <div class="bg-pattern"></div>
    <div class="container">
      <div class="content">
        <div class="cat-icon">
          <i class="fas fa-cat"></i>
        </div>
        <h1>Caaaaaaaaaaaaaaat!</h1>
        <div class="d-flex">
          <input
            type="text"
            class="input-url"
            id="input-url"
            placeholder="Paste your URL here, meow~"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button id="ccc-button" onclick="cccat()">cccccat！</button>
        </div>
        <div id="output-div" style="display: none">
          <h2>Your purrfectly long URL:</h2>
          <div class="url-box">
            <a id="output-url" target="_blank"></a>
          </div>
          <div class="tooltip">
            <button id="copy-button" onclick="copy()">
              <i class="fas fa-copy"></i> Copy
            </button>
            <span class="tooltip-text">Copied!</span>
          </div>
        </div>
      </div>
    </div>
    <footer>
      <i class="fas fa-paw"></i>
      made with
      <i class="fas fa-heart"></i>
      by
      <a target="_blank" href="https://luca.gg">luca.gg</a>
      <span>|</span>
      <a target="_blank" href="https://github.com/lucaceriani/ooo">source</a>
    </footer>
  </body>
</html>
